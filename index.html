<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPL 영어학원</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap');
:root{
  --navy:#1B2A6B;--navy2:#0f1a45;--navy3:#2d3f8f;
  --red:#C0272D;--red2:#e03035;
  --gold:#F5C518;--silver:#A8A9AD;--bronze:#CD7F32;
  --bg:#eef0f8;--card:#fff;--text:#1a1a2e;--muted:#6b7280;
  --border:#e0e4f0;
  --hw:#1B2A6B;--ohw:#C0272D;--att:#16a34a;--att2:#d97706;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}

/* ── FIREBASE 설정 화면 ── */
#scr-setup{background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 60%,#8B0000 130%);align-items:center;justify-content:center;padding:30px 16px;}#scr-setup.active{display:flex!important;}
.setup-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:36px;width:100%;max-width:540px;backdrop-filter:blur(8px);}
.setup-box h2{color:#fff;font-size:20px;font-weight:700;margin-bottom:6px;}
.setup-box .sub{color:rgba(255,255,255,.55);font-size:13px;margin-bottom:22px;line-height:1.6;}
.fb-inp-wrap{margin-top:16px;}
.fb-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fb-inp{width:100%;padding:10px 12px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;margin-bottom:8px;}
.fb-inp::placeholder{color:rgba(255,255,255,.3);}
.btn-setup{width:100%;padding:13px;border:none;border-radius:10px;background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}

/* ── LOADING ── */
#scr-loading{background:var(--navy2);flex-direction:column;align-items:center;justify-content:center;gap:18px;}#scr-loading.active{display:flex!important;}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{color:rgba(255,255,255,.7);font-size:14px;font-weight:500;}

/* ── HDR ── */
.hdr{background:var(--navy);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.logo-text-hdr{font-family:'Bebas Neue',sans-serif;color:#fff;font-size:22px;letter-spacing:2px;}
.hdr-user{font-size:12px;color:rgba(255,255,255,.75);font-weight:500;}
.btn-logout{padding:5px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:transparent;color:rgba(255,255,255,.8);font-size:12px;cursor:pointer;}

/* ── LANDING ── */
.landing-wrap{min-height:100vh;background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 55%,#8B0000 130%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.landing-logo-txt h1{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#fff;letter-spacing:4px;}
.login-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.login-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:36px 40px;text-align:center;cursor:pointer;width:210px;backdrop-filter:blur(8px);}
.login-card h3{color:#fff;font-size:17px;font-weight:700;}

/* ── MAIN ── */
.main{max-width:1020px;margin:0 auto;padding:22px 16px 60px;}
.tab-row{display:flex;gap:0;background:var(--border);border-radius:10px;padding:4px;margin-bottom:18px;}
.tab{flex:1;padding:8px;border:none;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);text-align:center;}
.tab.on{background:#fff;color:var(--navy);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:20px 22px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;}

/* ── SESSION PANEL ── */
.session-panel{background:linear-gradient(135deg,#f0f2ff,#fff);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:14px;}
.session-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.session-field{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center;}
.session-cnt-inp{width:56px;padding:5px;border:1.5px solid var(--border);border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:20px;text-align:center;color:var(--navy);outline:none;}

/* ── TABLES ── */
.notion-table{width:100%;border-collapse:collapse;}
.notion-table th{background:var(--navy);color:#fff;padding:9px 10px;font-size:11px;}
.notion-table td{padding:10px;border-bottom:1px solid var(--border);text-align:center;}
.chk-wrap{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.chk-box{width:22px;height:22px;border-radius:5px;border:2px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:transparent;}
.chk-box.on{color:#fff;}
.chk-hw-c{border-color:var(--hw);}.chk-hw-c.on{background:var(--hw);}
.chk-ohw-c{border-color:var(--ohw);}.chk-ohw-c.on{background:var(--ohw);}
.chk-att-c{border-color:var(--att);}.chk-att-c.on{background:var(--att);}
.chk-att2-c{border-color:var(--att2);}.chk-att2-c.on{background:var(--att2);}

/* ── BTNS ── */
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:5px 12px;font-size:11px;}
.f-inp{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div id="scr-setup" class="screen">
  <div class="setup-box">
    <h2>🔧 Firebase 연결 설정</h2>
    <div class="fb-inp-wrap">
      <input class="fb-inp" id="fb-databaseURL" placeholder="https://your-project.firebaseio.com">
      <button class="btn-setup" onclick="connectFirebase()">🔗 연결하기</button>
    </div>
  </div>
</div>

<div id="scr-loading" class="screen">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">데이터 불러오는 중...</div>
</div>

<div id="scr-landing" class="screen active">
  <div class="landing-wrap">
    <div class="landing-logo-txt"><h1>EPL</h1></div>
    <div class="login-cards">
      <div class="login-card" onclick="goWithRefresh('scr-admin-login')"><h3>👨‍🏫 관리자</h3></div>
      <div class="login-card" onclick="goWithRefresh('scr-student-login')"><h3>🎓 학생</h3></div>
    </div>
  </div>
</div>

<div id="scr-admin-login" class="screen">
  <div class="main" style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="card" style="width:300px;">
      <h2>관리자 로그인</h2>
      <input class="f-inp" type="password" id="admin-pw" placeholder="비밀번호" style="margin:10px 0;">
      <button class="btn btn-navy" style="width:100%;" onclick="adminLogin()">로그인</button>
    </div>
  </div>
</div>

<div id="scr-admin" class="screen">
  <div class="hdr">
    <div class="logo-text-hdr">EPL ADMIN</div>
    <div class="hdr-right">
      <button class="btn-logout" onclick="go('scr-landing')">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <div class="tab-row" id="admin-tabs">
      <button class="tab on" onclick="adminTab('scores')">📋 점수 입력</button>
      <button class="tab" onclick="adminTab('students')">👥 학생 관리</button>
    </div>

    <div id="atab-scores">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div id="a-class-filter"></div>
          <button class="btn btn-navy" onclick="saveScores()">💾 전체 저장</button>
        </div>
      </div>
      
      <div class="session-panel">
        <div class="card-title" id="sess-target-label">📅 수업 횟수 설정</div>
        <div class="session-grid">
          <div class="session-field"><div class="fb-lbl">숙제</div><input class="session-cnt-inp" id="sess-hw" type="number"></div>
          <div class="session-field"><div class="fb-lbl">온라인</div><input class="session-cnt-inp" id="sess-ohw" type="number"></div>
          <div class="session-field"><div class="fb-lbl">출석</div><input class="session-cnt-inp" id="sess-att" type="number"></div>
          <div class="session-field"><div class="fb-lbl">태도</div><input class="session-cnt-inp" id="sess-att2" type="number"></div>
        </div>
        <button class="btn btn-navy btn-sm" style="margin-top:10px; width:100%;" onclick="saveSessions()">위 설정값을 현재 반에 저장</button>
      </div>

      <div id="score-table-wrap"></div>
    </div>

    <div id="atab-students" style="display:none;">
      <div class="card">
        <div class="card-title">학생 목록 및 반 이동</div>
        <div id="student-list-wrap"></div>
      </div>
    </div>
  </div>
</div>

<div id="scr-student-login" class="screen"></div> <script>
const CATS=[
  {key:'hw', label:'숙제', icon:'📚', cls:'chk-hw-c', color:'#1B2A6B'},
  {key:'ohw',label:'온라인', icon:'💻', cls:'chk-ohw-c', color:'#C0272D'},
  {key:'att',label:'출석', icon:'✅', cls:'chk-att-c', color:'#16a34a'},
  {key:'att2',label:'태도', icon:'⭐', cls:'chk-att2-c', color:'#d97706'},
];
const DEFAULT_SESS={hw:12, ohw:12, att:16, att2:16};
const ROOT='epl';
let USE_FIREBASE=true; 
const FB_DB_URL = "https://epl-students-score-default-rtdb.firebaseio.com"; //

let APP={
  students:[], studentPws:{}, adminPw:'epl2024',
  classes:['A반','B반','C반','D반'], scores:{}, sessions:{}
};
let curMonth='2024-03'; // 예시 월
let adminCls='A반';

// ── 데이터베이스 함수 ──
async function dbGet(path){
  const res=await fetch(`${FB_DB_URL}/${ROOT}/${path}.json`);
  return await res.json();
}
async function dbSet(path,val){
  await fetch(`${FB_DB_URL}/${ROOT}/${path}.json`, {
    method:'PUT', body:JSON.stringify(val)
  });
}

// ── 초기화 ──
async function initApp(){
  const data = await dbGet('') || {};
  APP.students = Object.entries(data.students || {}).map(([id,v])=>({id, ...v}));
  APP.sessions = data.sessions || {};
  APP.scores = data.scores || {};
  APP.studentPws = data.studentPws || {};
  renderAdmin();
}

// ── 관리자 기능 ──
function adminTab(t){
  document.getElementById('atab-scores').style.display = t==='scores'?'block':'none';
  document.getElementById('atab-students').style.display = t==='students'?'block':'none';
  if(t==='students') renderStudentList();
}

function renderClassFilter(){
  document.getElementById('a-class-filter').innerHTML = APP.classes.map(c=>
    `<button onclick="setCls('${c}')" class="btn btn-sm ${adminCls===c?'btn-navy':'btn-out'}">${c}</button>`
  ).join('');
}

function setCls(c){
  adminCls = c;
  renderClassFilter();
  renderScoreTable();
}

// ── 수업 횟수 설정 (반별 독립 저장) ──
function getSessions(className){
  return APP.sessions[curMonth]?.[className] || DEFAULT_SESS;
}

function loadSessionUI(){
  const sess = getSessions(adminCls);
  CATS.forEach(c=>{ document.getElementById('sess-'+c.key).value = sess[c.key]; });
  document.getElementById('sess-target-label').textContent = `📅 ${adminCls} 수업 횟수 설정`;
}

async function saveSessions(){
  const sess={};
  CATS.forEach(c=>{ sess[c.key] = parseInt(document.getElementById('sess-'+c.key).value); });
  if(!APP.sessions[curMonth]) APP.sessions[curMonth]={};
  APP.sessions[curMonth][adminCls] = sess; // 반별 저장
  await dbSet(`sessions/${curMonth}`, APP.sessions[curMonth]);
  toast(`✅ ${adminCls} 설정 저장됨`);
  renderScoreTable();
}

// ── 학생 관리 (반 수정 기능 포함) ──
function renderStudentList(){
  let html = `<table class="notion-table"><thead><tr><th>이름</th><th>반 이동</th><th>작업</th></tr></thead><tbody>`;
  APP.students.forEach(s=>{
    html += `<tr>
      <td>${s.name}</td>
      <td>
        <select class="f-inp" onchange="updateStudentClass('${s.id}', this.value)">
          ${APP.classes.map(c=>`<option value="${c}" ${c===s.class?'selected':''}>${c}</option>`).join('')}
        </select>
      </td>
      <td><button class="btn btn-red btn-sm" onclick="removeStudent('${s.id}')">삭제</button></td>
    </tr>`;
  });
  document.getElementById('student-list-wrap').innerHTML = html + `</tbody></table>`;
}

async function updateStudentClass(sid, newClass){
  const student = APP.students.find(s=>s.id===sid);
  student.class = newClass;
  await dbSet(`students/${sid}/class`, newClass);
  toast(`✅ ${student.name} -> ${newClass} 이동 완료`);
}

// ── 점수판 ──
function renderScoreTable(){
  const students = APP.students.filter(s=>s.class===adminCls);
  const sess = getSessions(adminCls);
  let html = `<table class="notion-table"><thead><tr><th>이름</th>`;
  CATS.forEach(c=> html += `<th>${c.icon}${c.label}(${sess[c.key]})</th>`);
  html += `<th>총점</th></tr></thead><tbody>`;
  
  students.forEach(s=>{
    html += `<tr><td>${s.name}</td>`;
    CATS.forEach(c=>{
      html += `<td>${sess[c.key]}회 기준 체크</td>`; // 체크박스 로직 생략(기존 코드 활용)
    });
    html += `<td>-</td></tr>`;
  });
  document.getElementById('score-table-wrap').innerHTML = html + `</tbody></table>`;
  loadSessionUI();
}

function adminLogin(){ go('scr-admin'); initApp(); }
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(m){
  const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}
function renderAdmin(){ renderClassFilter(); renderScoreTable(); }
function goWithRefresh(id){ go(id); }
</script>
</body>
</html>
