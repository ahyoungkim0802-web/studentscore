<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPL 영어학원</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap');
:root{
  --navy:#1B2A6B;--navy2:#0f1a45;--navy3:#2d3f8f;
  --red:#C0272D;--red2:#e03035;
  --gold:#F5C518;--silver:#A8A9AD;--bronze:#CD7F32;
  --bg:#eef0f8;--card:#fff;--text:#1a1a2e;--muted:#6b7280;
  --border:#e0e4f0;
  --hw:#1B2A6B;--ohw:#C0272D;--att:#16a34a;--att2:#d97706;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}

/* ── FIREBASE 설정 화면 ── */
#scr-setup{background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 60%,#8B0000 130%);align-items:center;justify-content:center;padding:30px 16px;}#scr-setup.active{display:flex!important;}
.setup-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:36px;width:100%;max-width:540px;backdrop-filter:blur(8px);}
.setup-box h2{color:#fff;font-size:20px;font-weight:700;margin-bottom:6px;}
.setup-box .sub{color:rgba(255,255,255,.55);font-size:13px;margin-bottom:22px;line-height:1.6;}
.fb-inp-wrap{margin-top:16px;}
.fb-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fb-inp{width:100%;padding:10px 12px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;margin-bottom:8px;}
.btn-setup{width:100%;padding:13px;border:none;border-radius:10px;background:var(--red);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.setup-err{color:#fca5a5;font-size:12px;margin-top:8px;display:none;}

/* ── LOADING ── */
#scr-loading{background:var(--navy2);flex-direction:column;align-items:center;justify-content:center;gap:18px;}#scr-loading.active{display:flex!important;}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{color:rgba(255,255,255,.7);font-size:14px;font-weight:500;}

/* ── HDR ── */
.hdr{background:var(--navy);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.logo-text-hdr{font-family:'Bebas Neue',sans-serif;color:#fff;font-size:22px;letter-spacing:2px;}
.logo-sub-hdr{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:2px;margin-top:-2px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-user{font-size:12px;color:rgba(255,255,255,.75);font-weight:500;}
.btn-logout{padding:5px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:transparent;color:rgba(255,255,255,.8);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;}

/* ── LANDING ── */
.landing-wrap{min-height:100vh;background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 55%,#8B0000 130%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.landing-logo-txt{text-align:center;margin-bottom:48px;}
.landing-logo-txt h1{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#fff;letter-spacing:4px;}
.landing-logo-txt p{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:3px;margin-top:4px;}
.login-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.login-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:36px 40px;text-align:center;cursor:pointer;transition:all .25s;width:210px;backdrop-filter:blur(8px);}
.login-card:hover{background:rgba(255,255,255,.16);transform:translateY(-4px);}
.login-card .icon{font-size:38px;margin-bottom:12px;}
.login-card h3{color:#fff;font-size:17px;font-weight:700;margin-bottom:5px;}

/* ── LOGIN BOX ── */
.login-wrap{min-height:100vh;background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 55%,#8B0000 130%);display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.login-box{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:40px;width:100%;max-width:400px;backdrop-filter:blur(8px);}
.login-box h2{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px;}
.inp{width:100%;padding:11px 14px;border:1.5px solid rgba(255,255,255,.2);border-radius:10px;background:rgba(255,255,255,.1);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;margin-bottom:12px;}
.btn-login{width:100%;padding:13px;border:none;border-radius:10px;background:var(--red);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.err-msg{color:#fca5a5;font-size:12px;margin:-6px 0 10px;display:none;}
.btn-back{display:block;text-align:center;margin-top:14px;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;text-decoration:underline;}

/* ── MAIN ── */
.main{max-width:1020px;margin:0 auto;padding:22px 16px 60px;}
.tab-row{display:flex;gap:0;background:var(--border);border-radius:10px;padding:4px;margin-bottom:18px;}
.tab{flex:1;padding:8px;border:none;border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);text-align:center;}
.tab.on{background:#fff;color:var(--navy);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:20px 22px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;}

/* ── MONTH NAV ── */
.month-nav{display:flex;align-items:center;gap:12px;}
.mon-btn{width:30px;height:30px;border:1.5px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mon-label{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--navy);min-width:120px;text-align:center;}

/* ── SESSION PANEL ── */
.session-panel{background:linear-gradient(135deg,#f0f2ff,#fff);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:14px;}
.session-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.session-field{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center;}
.session-cnt-inp{width:56px;padding:5px;border:1.5px solid var(--border);border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:20px;text-align:center;}

/* ── CHECKBOXES ── */
.notion-table{width:100%;border-collapse:collapse;}
.notion-table th{background:var(--navy);color:#fff;padding:9px 10px;font-size:11px;text-align:center;}
.notion-table td{padding:10px;border-bottom:1px solid var(--border);text-align:center;}
.chk-wrap{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.chk-box{width:22px;height:22px;border-radius:5px;border:2px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:transparent;}
.chk-box.on{color:#fff;}
.chk-hw-c{border-color:var(--hw);}.chk-hw-c.on{background:var(--hw);}
.chk-ohw-c{border-color:var(--ohw);}.chk-ohw-c.on{background:var(--ohw);}
.chk-att-c{border-color:var(--att);}.chk-att-c.on{background:var(--att);}
.chk-att2-c{border-color:var(--att2);}.chk-att2-c.on{background:var(--att2);}
.tot-chip{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--navy);}

/* ── RANKING ── */
.rtbl{width:100%;border-collapse:collapse;font-size:13px;}
.rtbl th{padding:9px 10px;text-align:center;font-size:11px;border-bottom:2px solid var(--border);}
.rtbl td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--border);}
.rb{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-family:'Bebas Neue',sans-serif;}
.r1{background:var(--gold);color:#7a5c00;}.r2{background:var(--silver);color:#555;}.r3{background:var(--bronze);color:#6b3800;}.rn{background:var(--border);color:var(--muted);}

/* ── BTNS ── */
.btn{padding:8px 18px;border:none;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:5px 12px;font-size:11px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

.total-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);border-radius:16px;padding:26px;display:flex;align-items:center;gap:22px;color:#fff;}
.total-num{font-family:'Bebas Neue',sans-serif;font-size:68px;min-width:110px;text-align:center;}

@media(max-width:640px){
  .session-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div id="scr-setup" class="screen">
  <div class="setup-box">
    <h2>🔧 Firebase 연결 설정</h2>
    <p class="sub">데이터 연동을 위해 Firebase URL을 입력하세요.</p>
    <div class="fb-inp-wrap">
      <div class="fb-lbl">Database URL</div>
      <input class="fb-inp" id="fb-databaseURL" placeholder="https://your-project.firebaseio.com">
      <div class="setup-err" id="setup-err"></div>
      <button class="btn-setup" onclick="connectFirebase()">🔗 연결하기</button>
    </div>
  </div>
</div>

<div id="scr-loading" class="screen">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">데이터 불러오는 중...</div>
</div>

<div id="scr-landing" class="screen active">
  <div class="landing-wrap">
    <div class="landing-logo-txt"><h1>EPL</h1><p>Empower · Practice · Literacy</p></div>
    <div class="login-cards">
      <div class="login-card" onclick="goWithForcedSync('scr-admin-login')">
        <div class="icon">👨‍🏫</div><h3>관리자</h3>
      </div>
      <div class="login-card" onclick="goWithForcedSync('scr-student-login')">
        <div class="icon">🎓</div><h3>학생</h3>
      </div>
    </div>
    <div style="margin-top:32px; text-align:center;">
      <span style="font-size:12px;color:#fff;cursor:pointer;background:rgba(255,255,255,0.1);padding:8px 16px;border-radius:20px;" onclick="syncNow()">🔄 지금 데이터 동기화</span>
    </div>
  </div>
</div>

<div id="scr-admin-login" class="screen">
  <div class="login-wrap">
    <div class="login-box">
      <h2>👨‍🏫 관리자 로그인</h2>
      <input class="inp" type="password" id="admin-pw" placeholder="비밀번호">
      <div class="err-msg" id="admin-err">비밀번호가 틀렸습니다</div>
      <button class="btn-login" onclick="adminLogin()">로그인</button>
      <span class="btn-back" onclick="go('scr-landing')">← 돌아가기</span>
    </div>
  </div>
</div>

<div id="scr-student-login" class="screen">
  <div class="login-wrap">
    <div class="login-box">
      <h2>🎓 학생 로그인</h2>
      <input class="inp" type="text" id="sl-name-input" placeholder="이름 입력">
      <input class="inp" type="password" id="sl-pw" placeholder="비밀번호">
      <div class="err-msg" id="student-err">정보가 올바르지 않습니다</div>
      <button class="btn-login" onclick="studentLogin()">확인</button>
      <span class="btn-back" onclick="go('scr-landing')">← 돌아가기</span>
    </div>
  </div>
</div>

<div id="scr-admin" class="screen">
  <div class="hdr">
    <div><div class="logo-text-hdr">EPL ADMIN</div></div>
    <div class="hdr-right">
      <span id="fb-status" style="font-size:10px;padding:2px 8px;border-radius:10px;background:#dcfce7;color:#16a34a;">● FB 연결</span>
      <button style="font-size:11px;padding:4px 10px;background:#fff;border:1px solid #ddd;border-radius:8px;cursor:pointer;" onclick="syncNow()">🔄 동기화</button>
      <button class="btn-logout" onclick="go('scr-landing')" style="background:transparent; color:#fff; border:1px solid #fff;">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <div class="tab-row" id="admin-tabs">
      <button class="tab on" onclick="adminTab('scores')">📋 점수 입력</button>
      <button class="tab" onclick="adminTab('ranking')">🏆 랭킹</button>
      <button class="tab" onclick="adminTab('students')">👥 학생 관리</button>
    </div>
    
    <div id="atab-scores">
        <div class="month-nav" style="margin-bottom:15px; justify-content:center;">
          <button class="mon-btn" onclick="changeMonth(-1)">◀</button>
          <div class="mon-label" id="a-mon-label"></div>
          <button class="mon-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div id="score-table-wrap" style="overflow-x:auto;"></div>
        <button class="btn btn-navy" style="width:100%; margin-top:15px; padding:15px;" onclick="saveScores()">💾 데이터 서버에 저장</button>
    </div>
    
    <div id="atab-ranking" style="display:none;"><div id="a-ranking-wrap"></div></div>
    <div id="atab-students" style="display:none;">
        <div id="student-list-wrap"></div>
    </div>
  </div>
</div>

<div id="scr-student" class="screen">
  <div class="hdr">
    <div><div class="logo-text-hdr">EPL STUDENT</div></div>
    <div class="hdr-right">
      <span class="hdr-user" id="s-hdr-name">🎓 학생</span>
      <button class="btn-logout" onclick="go('scr-landing')" style="background:transparent; color:#fff; border:1px solid #fff;">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <div class="month-nav" style="margin-bottom:15px; justify-content:center;">
      <button class="mon-btn" onclick="changeMonth(-1)">◀</button>
      <div class="mon-label" id="s-mon-label"></div>
      <button class="mon-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div id="s-total-hero"></div>
    <div id="s-stat-grid" class="stat-grid" style="margin-top:15px;"></div>
  </div>
</div>

<script>
// 전역 변수
const CATS=[
  {key:'hw', label:'숙제', icon:'📚', cls:'chk-hw-c', color:'#1B2A6B'},
  {key:'ohw',label:'온라인', icon:'💻', cls:'chk-ohw-c', color:'#C0272D'},
  {key:'att',label:'출석', icon:'✅', cls:'chk-att-c', color:'#16a34a'},
  {key:'att2',label:'태도', icon:'⭐', cls:'chk-att2-c', color:'#d97706'},
];
const DEFAULT_SESS={hw:12, ohw:12, att:16, att2:16};
const LS_KEY='epl_fb_config';
const ROOT='epl_data_v2'; // 버전을 올려서 충돌 방지

let APP = { students:[], studentPws:{}, adminPw:'epl2024', scores:{}, sessions:{} };
let FB_DB_URL = null;
let USE_FIREBASE = false;
let curMonth = new Date(); curMonth.setDate(1);
let curStudentId = null;
let liveChk = {};

// 핵심: Firebase 통신 함수 (캐시 방지 헤더 추가)
async function dbGet(path) {
    if (!USE_FIREBASE) return JSON.parse(localStorage.getItem(ROOT + path));
    const res = await fetch(`${FB_DB_URL}/${path}.json?nocache=${Date.now()}`, {
        method: 'GET',
        headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
    });
    return res.ok ? await res.json() : null;
}

async function dbSet(path, val) {
    if (!USE_FIREBASE) return localStorage.setItem(ROOT + path, JSON.stringify(val));
    const res = await fetch(`${FB_DB_URL}/${path}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(val)
    });
    return res.ok;
}

// 강제 동기화 함수
async function syncNow() {
    toast("🔄 서버에서 최신 데이터를 가져오는 중...");
    await initApp();
    if (document.getElementById('scr-admin').classList.contains('active')) renderAdmin();
    if (document.getElementById('scr-student').classList.contains('active')) renderStudent();
    toast("✅ 동기화 완료!");
}

async function goWithForcedSync(screenId) {
    await initApp();
    go(screenId);
}

// 초기화
async function initApp() {
    try {
        const data = await dbGet(""); // 전체 데이터 한 번에 가져오기
        if (data) {
            APP.students = data.students ? Object.values(data.students) : [];
            APP.studentPws = data.pws || {};
            APP.scores = data.scores || {};
            APP.adminPw = data.adminPw || 'epl2024';
            setFbStatus(true);
        }
    } catch (e) {
        console.error(e);
        setFbStatus(false);
    }
    updateMonLabels();
}

function setFbStatus(ok) {
    const el = document.getElementById('fb-status');
    if (!el) return;
    el.style.background = ok ? '#dcfce7' : '#fee2e2';
    el.style.color = ok ? '#16a34a' : '#dc2626';
    el.textContent = ok ? '● FB 연결됨' : '● FB 연결오류';
}

// 관리자 로직
function adminTab(t) {
    ['scores', 'ranking', 'students'].forEach(x => {
        document.getElementById('atab-' + x).style.display = (x === t) ? 'block' : 'none';
    });
    if (t === 'scores') renderScoreTable();
    if (t === 'ranking') renderAdminRanking();
}

function renderScoreTable() {
    const mon = monKey(curMonth);
    const wrap = document.getElementById('score-table-wrap');
    if (APP.students.length === 0) { wrap.innerHTML = "학생 데이터가 없습니다."; return; }
    
    let html = `<table class="notion-table"><thead><tr><th>이름</th>${CATS.map(c=>`<th>${c.label}</th>`).join('')}<th>총점</th></tr></thead><tbody>`;
    APP.students.forEach(s => {
        const sc = APP.scores[mon]?.[s.id] || emptyChk();
        const tot = calcTotal(sc);
        html += `<tr>
            <td>${s.name}</td>
            ${CATS.map(c => `<td><div class="chk-wrap">${sc[c.key].map((on, i) => `<div class="chk-box ${c.cls} ${on?'on':''}" onclick="toggleChk('${s.id}','${c.key}',${i},this)">✓</div>`).join('')}</div></td>`).join('')}
            <td id="tot-${s.id}" class="tot-chip">${tot}</td>
        </tr>`;
    });
    wrap.innerHTML = html + "</tbody></table>";
}

function toggleChk(sid, cat, idx, el) {
    const mon = monKey(curMonth);
    if (!APP.scores[mon]) APP.scores[mon] = {};
    if (!APP.scores[mon][sid]) APP.scores[mon][sid] = emptyChk();
    
    APP.scores[mon][sid][cat][idx] = !APP.scores[mon][sid][cat][idx];
    el.classList.toggle('on');
    document.getElementById('tot-' + sid).textContent = calcTotal(APP.scores[mon][sid]);
}

async function saveScores() {
    toast("💾 서버에 저장 중...");
    const ok = await dbSet("scores", APP.scores);
    if (ok) toast("✅ 저장 완료! 다른 기기에서도 확인 가능합니다.");
    else toast("❌ 저장 실패. 인터넷 연결을 확인하세요.");
}

function emptyChk() {
    const r = {};
    CATS.forEach(c => r[c.key] = Array(DEFAULT_SESS[c.key]).fill(false));
    return r;
}

function calcTotal(sc) {
    let t = 0;
    CATS.forEach(c => { t += (sc[c.key].filter(Boolean).length * 25); });
    return t;
}

// 유틸리티
function go(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function monKey(d) { return d.getFullYear() + '-' + (d.getMonth() + 1); }
function updateMonLabels() {
    const l = (curMonth.getMonth() + 1) + "월";
    document.getElementById('a-mon-label').textContent = l;
    document.getElementById('s-mon-label').textContent = l;
}

function changeMonth(n) {
    curMonth.setMonth(curMonth.getMonth() + n);
    updateMonLabels();
    if (document.getElementById('scr-admin').classList.contains('active')) renderScoreTable();
    if (document.getElementById('scr-student').classList.contains('active')) renderStudent();
}

// 로그인
function adminLogin() {
    if (document.getElementById('admin-pw').value === APP.adminPw) go('scr-admin'), renderAdmin();
    else document.getElementById('admin-err').style.display = 'block';
}

function studentLogin() {
    const name = document.getElementById('sl-name-input').value;
    const pw = document.getElementById('sl-pw').value;
    const s = APP.students.find(x => x.name === name);
    if (s && APP.studentPws[s.id] === pw) {
        curStudentId = s.id;
        document.getElementById('s-hdr-name').textContent = "🎓 " + s.name;
        go('scr-student'); renderStudent();
    } else document.getElementById('student-err').style.display = 'block';
}

function renderStudent() {
    const mon = monKey(curMonth);
    const sc = APP.scores[mon]?.[curStudentId] || emptyChk();
    const tot = calcTotal(sc);
    document.getElementById('s-total-hero').innerHTML = `<div class="total-hero"><div class="total-num">${tot}</div><div><h3>내 점수</h3><p>${curMonth.getMonth()+1}월 기록</p></div></div>`;
    document.getElementById('s-stat-grid').innerHTML = CATS.map(c => {
        const cnt = sc[c.key].filter(Boolean).length;
        return `<div class="card"><div class="card-title">${c.icon} ${c.label}</div><div style="font-size:24px; font-weight:bold; color:${c.color}">${cnt * 25}점</div><div style="font-size:12px; color:#999;">${cnt}회 완료</div></div>`;
    }).join('');
}

// 접속 시 Firebase URL 로드
async function connectFirebase() {
    const url = document.getElementById('fb-databaseURL').value.trim().replace(/\/$/, "");
    FB_DB_URL = url;
    const ok = await dbSet("ping", Date.now());
    if (ok) {
        localStorage.setItem(LS_KEY, url);
        document.getElementById('scr-setup').classList.remove('active');
        await initApp();
        go('scr-landing');
    } else {
        document.getElementById('setup-err').textContent = "URL이 잘못되었거나 권한이 없습니다.";
        document.getElementById('setup-err').style.display = 'block';
    }
}

(async function() {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
        FB_DB_URL = saved;
        USE_FIREBASE = true;
        document.getElementById('scr-setup').classList.remove('active');
        await initApp();
    } else {
        document.getElementById('scr-setup').classList.add('active');
    }
})();
</script>
